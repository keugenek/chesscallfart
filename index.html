<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chesscallFART — шахматы с видеосвязью</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #e6d8f5; color: #2a1a3a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; }
  header { padding: 10px 20px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; font-weight: 600; color: #f3eafa; }
  header .status { font-size: 13px; color: #aaa; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; overflow: hidden; }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } }

  /* Left: chess */
  .left { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 0; }
  #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: min(80vh, 45vw, 600px); height: min(80vh, 45vw, 600px); flex-shrink: 0; border: 3px solid #444; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  @media (max-width: 800px) { #board { width: min(60vh, 90vw, 600px); height: min(60vh, 90vw, 600px); } }
  .square { display: flex; align-items: center; justify-content: center; font-size: 8vmin; cursor: pointer; user-select: none; position: relative; transition: background 0.1s; }
  @media (min-width: 800px) { .square { font-size: min(7vh, 7vw); } }
  .square.light { background: #f0d9b5; }
  .square.dark  { background: #b58863; }
  .square.selected { background: #f6f669 !important; }
  .square.move-target::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(0,0,0,0.25); border-radius: 50%; }
  .square.move-target.has-piece::after { width: 90%; height: 90%; background: transparent; border: 4px solid rgba(0,0,0,0.25); border-radius: 50%; }
  .square.last-move { box-shadow: inset 0 0 0 4px rgba(255, 255, 100, 0.6); }
  .square.in-check { background: #ff6b6b !important; }
  .square .piece { width: 88%; height: 88%; pointer-events: none; user-select: none; -webkit-user-drag: none; }

  .game-info { font-size: 14px; color: #2a1a3a; text-align: center; }
  .game-info .role { font-weight: 600; }
  .controls { display: flex; gap: 8px; }
  button { background: #2a7; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
  button:hover { background: #3b8; }
  button.secondary { background: #444; }
  button.secondary:hover { background: #555; }
  button:disabled { background: #333; color: #777; cursor: not-allowed; }

  /* Right: video + connection */
  .right { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .videos { flex: 1; position: relative; background: #000; border-radius: 8px; overflow: hidden; min-height: 200px; }
  #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
  #local-video { position: absolute; bottom: 12px; right: 12px; width: 25%; min-width: 120px; max-width: 200px; aspect-ratio: 4/3; object-fit: cover; border: 2px solid #555; border-radius: 4px; background: #222; transform: scaleX(-1); }
  .video-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; pointer-events: none; }

  .connect-panel { background: #222; border: 1px solid #333; border-radius: 8px; padding: 16px; }
  .connect-panel h2 { font-size: 15px; margin-bottom: 12px; color: #ddd; }
  .my-code-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .my-code-row label { font-size: 13px; color: #aaa; }
  .my-code { font-family: monospace; font-size: 16px; background: #111; padding: 6px 10px; border-radius: 4px; color: #6cf; letter-spacing: 1px; user-select: all; }
  .peer-row { display: flex; gap: 8px; }
  .peer-row input { flex: 1; background: #111; border: 1px solid #444; color: #eee; padding: 8px 10px; border-radius: 4px; font-family: monospace; font-size: 14px; }
  .peer-row input:focus { outline: none; border-color: #2a7; }
  .hint { font-size: 12px; color: #888; margin-top: 8px; }
  .error { color: #f66; font-size: 13px; margin-top: 8px; }
  .hidden { display: none !important; }

  /* Fart cloud overlay */
  .fart-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 90; overflow: hidden; }
  .fart-blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0; mix-blend-mode: multiply; will-change: transform, opacity; }
  @keyframes fart-puff {
    0%   { transform: translate(var(--ox, 0), var(--oy, 0)) scale(0.1); opacity: 0; }
    15%  { opacity: 0.95; }
    60%  { transform: translate(calc(var(--ox, 0) + var(--dx, 0)), calc(var(--oy, 0) + var(--dy, 0))) scale(1.4); opacity: 0.85; }
    100% { transform: translate(calc(var(--ox, 0) + var(--dx, 0) * 1.4), calc(var(--oy, 0) + var(--dy, 0) * 1.4 - 80px)) scale(1.8); opacity: 0; }
  }
  .fart-blob.b1 { background: radial-gradient(circle, #6fdc4a 0%, #4caf3c 60%, transparent 80%); }
  .fart-blob.b2 { background: radial-gradient(circle, #a8e063 0%, #56a832 60%, transparent 80%); }
  .fart-blob.b3 { background: radial-gradient(circle, #c1f07a 0%, #7dbf3a 60%, transparent 80%); }
  .fart-blob.b4 { background: radial-gradient(circle, #5fbf2a 0%, #2f7a18 60%, transparent 80%); }

  /* Time control selector */
  .time-control { margin-bottom: 12px; padding: 10px; background: #f3eafa; border-radius: 6px; }
  .time-control > label { display: block; font-size: 13px; color: #4a3060; margin-bottom: 8px; font-weight: 500; }
  .time-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .tc-btn { background: #d4c2ec; color: #2a1a3a; border: 2px solid transparent; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .tc-btn:hover { background: #c2acdf; }
  .tc-btn.active { background: #6a3fb5; border-color: #4a2880; color: #fff; }
  .custom-time { margin-top: 8px; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #4a3060; }
  .custom-time input { width: 70px; background: #fff; border: 1px solid #b89dd6; color: #2a1a3a; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
  .custom-time input:focus { outline: none; border-color: #6a3fb5; }

  /* Chess clocks */
  .clocks { display: flex; justify-content: space-between; width: min(80vh, 45vw, 600px); gap: 8px; }
  @media (max-width: 800px) { .clocks { width: min(60vh, 90vw, 600px); } }
  .clock { font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; padding: 8px 18px; background: #fff; border: 2px solid #888; border-radius: 6px; min-width: 110px; text-align: center; color: #333; transition: box-shadow 0.15s, background 0.15s, border-color 0.15s; }
  .clock-label { font-size: 11px; font-weight: normal; color: #666; display: block; margin-bottom: 2px; }
  .clock.active { border-color: #4caf3c; background: #e9f7e3; box-shadow: 0 0 14px rgba(76, 175, 60, 0.55); }
  .clock.low { background: #ffe0e0; border-color: #c33; color: #900; }
  .clock.low.active { box-shadow: 0 0 14px rgba(204, 51, 51, 0.6); }

  /* Win overlay */
  .win-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 95; display: flex; align-items: center; justify-content: center; gap: 6vw; }
  .win-icon { font-size: 18vmin; animation: win-spin 0.5s linear infinite; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4)); }
  .win-icon.center { font-size: 30vmin; animation-duration: 0.4s; }
  @keyframes win-spin { from { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.15); } to { transform: rotate(360deg) scale(1); } }

  /* Game-over modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-content { background: #222; border: 1px solid #444; border-radius: 12px; padding: 28px 36px; text-align: center; max-width: 360px; }
  .modal-content h2 { font-size: 28px; margin-bottom: 12px; }
  .modal-content p { color: #ccc; margin-bottom: 18px; }
</style>
</head>
<body>

<header>
  <h1>♞ chesscall<span style="color:#a8e063">FART</span></h1>
  <div class="status" id="conn-status">Нет подключения</div>
</header>

<main>
  <div class="left">
    <div class="game-info" id="game-info">Ожидание подключения…</div>
    <div class="clocks hidden" id="clocks-top"><div class="clock" id="clock-opponent"><span class="clock-label">Соперник</span><span id="clock-opponent-time">—</span></div><div style="flex:1"></div></div>
    <div id="board"></div>
    <div class="clocks hidden" id="clocks-bottom"><div style="flex:1"></div><div class="clock" id="clock-self"><span class="clock-label">Ты</span><span id="clock-self-time">—</span></div></div>
    <div class="controls hidden" id="game-controls">
      <button class="secondary" id="resign-btn">Сдаться</button>
      <button class="secondary" id="newgame-btn">Новая партия</button>
    </div>
  </div>

  <div class="right">
    <div class="videos">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay playsinline muted></video>
      <div class="video-placeholder" id="video-placeholder">Камера включится после подключения</div>
    </div>

    <div class="connect-panel" id="connect-panel">
      <h2>Подключись к другу</h2>
      <div class="time-control">
        <label>Время на партию:</label>
        <div class="time-options">
          <button type="button" class="tc-btn" data-tc="5">5 мин</button>
          <button type="button" class="tc-btn active" data-tc="10">10 мин</button>
          <button type="button" class="tc-btn" data-tc="20">20 мин</button>
          <button type="button" class="tc-btn" data-tc="custom">Свой</button>
          <button type="button" class="tc-btn" data-tc="0">Без часов</button>
        </div>
        <div class="custom-time hidden" id="custom-time-row">
          <input type="number" id="custom-minutes" min="1" max="180" value="15">
          <span>мин</span>
        </div>
      </div>
      <div class="my-code-row">
        <label>Твоя ссылка:</label>
        <span class="my-code" id="my-link">загрузка…</span>
        <button id="copy-btn">Копировать ссылку</button>
      </div>
      <div class="hint">Отправь эту ссылку другу — он откроет её, и игра начнётся автоматически. Тот, кто отправил ссылку, играет белыми.</div>
      <div class="error hidden" id="error-msg"></div>
    </div>
  </div>
</main>

<div class="fart-overlay" id="fart-overlay" aria-hidden="true"></div>
<div class="win-overlay hidden" id="win-overlay" aria-hidden="true"><span class="win-icon">🥇</span><span class="win-icon center">🏆</span><span class="win-icon">🥇</span></div>

<div class="modal hidden" id="game-over-modal">
  <div class="modal-content">
    <h2 id="game-over-title">Игра окончена</h2>
    <p id="game-over-text"></p>
    <button id="play-again-btn">Сыграть ещё раз</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module">
import { Chess } from 'https://cdn.jsdelivr.net/npm/chess.js@1.0.0/+esm';

// ---------- Chess state ----------
const game = new Chess();
let myColor = null; // 'w' | 'b'
let selected = null;
let legalTargets = [];
let lastMove = null;

// ---------- Clock state ----------
let selectedTcMs = 10 * 60 * 1000;       // chosen in UI before connect
let timeControlMs = 10 * 60 * 1000;       // active time-control for the game
let clocks = { w: 0, b: 0 };
let activeClockColor = null;              // 'w' | 'b' | null
let clockInterval = null;
let lastTickAt = 0;

const PIECE_BASE = 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/cburnett/';
function pieceUrl(color, type) { return `${PIECE_BASE}${color}${type.toUpperCase()}.svg`; }

const boardEl = document.getElementById('board');
const gameInfoEl = document.getElementById('game-info');

function renderBoard() {
  boardEl.innerHTML = '';
  const board = game.board();
  const flip = myColor === 'b';
  const checkSquare = game.inCheck() ? findKing(game.turn()) : null;

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const r = flip ? 7 - row : row;
      const c = flip ? 7 - col : col;
      const square = String.fromCharCode(97 + c) + (8 - r);
      const piece = board[r][c];
      const sq = document.createElement('div');
      sq.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
      sq.dataset.square = square;
      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece';
        img.src = pieceUrl(piece.color, piece.type);
        img.draggable = false;
        img.alt = piece.color + piece.type;
        sq.appendChild(img);
      }
      if (selected === square) sq.classList.add('selected');
      if (legalTargets.includes(square)) {
        sq.classList.add('move-target');
        if (piece) sq.classList.add('has-piece');
      }
      if (lastMove && (lastMove.from === square || lastMove.to === square)) sq.classList.add('last-move');
      if (checkSquare === square) sq.classList.add('in-check');
      sq.addEventListener('click', onSquareClick);
      boardEl.appendChild(sq);
    }
  }
  updateInfo();
}

function findKing(color) {
  const board = game.board();
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = board[r][c];
    if (p && p.color === color && p.type === 'k') return String.fromCharCode(97 + c) + (8 - r);
  }
  return null;
}

function updateInfo() {
  if (!myColor) { gameInfoEl.textContent = 'Ожидание подключения…'; return; }
  const youAre = myColor === 'w' ? 'белыми' : 'чёрными';
  const turnNom = game.turn() === 'w' ? 'Белые' : 'Чёрные';
  const yours = game.turn() === myColor ? '— твой ход' : '— ход соперника';
  gameInfoEl.innerHTML = `Ты играешь <span class="role">${youAre}</span>. ${turnNom} ходят ${yours}.`;
}

function onSquareClick(e) {
  if (!myColor) return;
  if (game.isGameOver()) return;
  if (game.turn() !== myColor) return;
  const square = e.currentTarget.dataset.square;
  const piece = game.get(square);

  if (selected) {
    if (legalTargets.includes(square)) {
      doMove(selected, square);
      return;
    }
    if (piece && piece.color === myColor) {
      selectSquare(square);
      return;
    }
    selected = null;
    legalTargets = [];
    renderBoard();
    return;
  }
  if (piece && piece.color === myColor) selectSquare(square);
}

function selectSquare(square) {
  selected = square;
  legalTargets = game.moves({ square, verbose: true }).map(m => m.to);
  renderBoard();
}

function doMove(from, to, promotion = 'q') {
  const moverColor = game.turn();
  const move = game.move({ from, to, promotion });
  if (!move) return;
  playMoveSound();
  lastMove = { from, to };
  selected = null;
  legalTargets = [];
  // Update clock: subtract elapsed from mover, then switch
  if (timeControlMs > 0 && activeClockColor) {
    const now = Date.now();
    clocks[activeClockColor] = Math.max(0, clocks[activeClockColor] - (now - lastTickAt));
    lastTickAt = now;
  }
  switchClockOnMove(moverColor, clocks[moverColor]);
  renderBoard();
  sendToOpponent({ type: 'move', from, to, promotion, clockMs: clocks[moverColor] });
  checkGameEnd();
}

function applyRemoteMove(m) {
  const moverColor = game.turn();
  const move = game.move({ from: m.from, to: m.to, promotion: m.promotion || 'q' });
  if (!move) return;
  playMoveSound();
  lastMove = { from: m.from, to: m.to };
  switchClockOnMove(moverColor, m.clockMs);
  renderBoard();
  checkGameEnd();
}

function checkGameEnd() {
  if (game.isCheckmate()) {
    stopGameClock();
    const loser = game.turn();
    const youLost = loser === myColor;
    showGameOver(youLost ? 'Ты проиграл! 💨' : 'Шах и мат! Ты выиграл! 🎉', youLost ? 'В следующий раз повезёт.' : 'Хорошая партия.', youLost, !youLost);
  } else if (game.isStalemate()) {
    stopGameClock();
    showGameOver('Пат', 'Ничья.', false);
  } else if (game.isDraw()) {
    stopGameClock();
    showGameOver('Ничья', 'Ничья.', false);
  }
}

function showGameOver(title, text, fart, won) {
  document.getElementById('game-over-title').textContent = title;
  document.getElementById('game-over-text').textContent = text;
  if (fart) {
    playFart();
    showFartCloud();
    setTimeout(() => document.getElementById('game-over-modal').classList.remove('hidden'), 600);
  } else if (won) {
    showWinOverlay();
    setTimeout(() => document.getElementById('game-over-modal').classList.remove('hidden'), 1800);
  } else {
    document.getElementById('game-over-modal').classList.remove('hidden');
  }
}

function showWinOverlay() {
  const o = document.getElementById('win-overlay');
  o.classList.remove('hidden');
  setTimeout(() => o.classList.add('hidden'), 2500);
}

function showFartCloud() {
  const overlay = document.getElementById('fart-overlay');
  overlay.innerHTML = '';
  const W = window.innerWidth;
  const H = window.innerHeight;
  // Origin: bottom-center-ish (where a fart would emerge)
  const originX = W * 0.5;
  const originY = H * 0.92;

  const totalBlobs = 28;
  for (let i = 0; i < totalBlobs; i++) {
    const blob = document.createElement('div');
    blob.className = 'fart-blob b' + (1 + (i % 4));

    // Size: 200-500px
    const size = 220 + Math.random() * 320;
    blob.style.width = size + 'px';
    blob.style.height = size + 'px';

    // Start position: spread near the origin
    const sx = originX - size / 2 + (Math.random() - 0.5) * 120;
    const sy = originY - size / 2 + (Math.random() - 0.5) * 60;
    blob.style.left = sx + 'px';
    blob.style.top = sy + 'px';

    // Drift direction: bias upward & outward to fill the whole screen
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.4; // mostly up, fanning out
    const distance = 600 + Math.random() * 700;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;
    blob.style.setProperty('--dx', dx + 'px');
    blob.style.setProperty('--dy', dy + 'px');

    // Stagger and duration
    const delay = Math.random() * 350;
    const duration = 1800 + Math.random() * 1200;
    blob.style.animation = `fart-puff ${duration}ms cubic-bezier(0.2, 0.6, 0.3, 1) ${delay}ms forwards`;

    overlay.appendChild(blob);
  }

  // Cleanup after animation
  setTimeout(() => { overlay.innerHTML = ''; }, 4000);
}

function newGame(broadcast = true) {
  game.reset();
  selected = null;
  legalTargets = [];
  lastMove = null;
  // Swap colors on rematch
  if (broadcast && myColor) {
    myColor = myColor === 'w' ? 'b' : 'w';
    sendToOpponent({ type: 'newgame', yourColor: myColor === 'w' ? 'b' : 'w', timeMs: timeControlMs });
  }
  document.getElementById('game-over-modal').classList.add('hidden');
  startGameClock();
  renderBoard();
}

// ---------- Clock logic ----------
function formatTime(ms) {
  if (ms < 0) ms = 0;
  const total = Math.ceil(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function startGameClock() {
  stopGameClock();
  if (timeControlMs <= 0) {
    document.getElementById('clocks-top').classList.add('hidden');
    document.getElementById('clocks-bottom').classList.add('hidden');
    return;
  }
  clocks = { w: timeControlMs, b: timeControlMs };
  activeClockColor = 'w';
  lastTickAt = Date.now();
  document.getElementById('clocks-top').classList.remove('hidden');
  document.getElementById('clocks-bottom').classList.remove('hidden');
  renderClocks();
  clockInterval = setInterval(tickClock, 200);
}

function stopGameClock() {
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  activeClockColor = null;
}

function tickClock() {
  if (!activeClockColor || timeControlMs <= 0) return;
  const now = Date.now();
  const elapsed = now - lastTickAt;
  lastTickAt = now;
  clocks[activeClockColor] = Math.max(0, clocks[activeClockColor] - elapsed);
  renderClocks();
  if (clocks[activeClockColor] <= 0) handleTimeOut(activeClockColor);
}

function switchClockOnMove(senderColor, senderClockMs) {
  if (timeControlMs <= 0) return;
  const now = Date.now();
  if (activeClockColor) {
    const elapsed = now - lastTickAt;
    clocks[activeClockColor] = Math.max(0, clocks[activeClockColor] - elapsed);
  }
  if (typeof senderClockMs === 'number') clocks[senderColor] = Math.max(0, senderClockMs);
  activeClockColor = senderColor === 'w' ? 'b' : 'w';
  lastTickAt = now;
  renderClocks();
}

function renderClocks() {
  if (!myColor || timeControlMs <= 0) return;
  const oppColor = myColor === 'w' ? 'b' : 'w';
  const oppEl = document.getElementById('clock-opponent');
  const selfEl = document.getElementById('clock-self');
  document.getElementById('clock-opponent-time').textContent = formatTime(clocks[oppColor]);
  document.getElementById('clock-self-time').textContent = formatTime(clocks[myColor]);
  oppEl.classList.toggle('active', activeClockColor === oppColor);
  selfEl.classList.toggle('active', activeClockColor === myColor);
  oppEl.classList.toggle('low', clocks[oppColor] < 30000);
  selfEl.classList.toggle('low', clocks[myColor] < 30000);
}

function handleTimeOut(loserColor) {
  stopGameClock();
  const youLost = loserColor === myColor;
  showGameOver(
    youLost ? 'Время вышло! Ты проиграл! 💨' : 'У соперника закончилось время! Ты выиграл! 🎉',
    youLost ? 'В следующий раз повезёт.' : 'Хорошая партия.',
    youLost,
    !youLost
  );
}

// ---------- Move sound (Web Audio) ----------
let moveAudioCtx = null;
function playMoveSound() {
  try {
    if (!moveAudioCtx) moveAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = moveAudioCtx;
    const now = ctx.currentTime;
    const dur = 0.09;

    // Wooden "thock": short filtered noise burst
    const samples = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, samples, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < samples; i++) data[i] = (Math.random() * 2 - 1);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1400;
    lp.Q.value = 1.5;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.0001, now);
    ng.gain.exponentialRampToValueAtTime(0.55, now + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    noise.connect(lp).connect(ng).connect(ctx.destination);

    // Low click body for the "thunk"
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(90, now + dur);
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.0001, now);
    og.gain.exponentialRampToValueAtTime(0.4, now + 0.005);
    og.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(og).connect(ctx.destination);

    noise.start(now); osc.start(now);
    noise.stop(now + dur); osc.stop(now + dur);
  } catch (e) { /* ignore */ }
}

// ---------- Fart synth (Web Audio) ----------
function playFart() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ctx.createGain();
    master.gain.value = 0.9;
    master.connect(ctx.destination);

    // A fart is a series of sputtering bursts. Schedule a few overlapping ones.
    const bursts = [
      { t: 0.00, dur: 0.55, f0: 160, f1: 70,  wob: 28, wobF: 24, vol: 0.55 },
      { t: 0.18, dur: 0.40, f0: 130, f1: 60,  wob: 35, wobF: 19, vol: 0.45 },
      { t: 0.42, dur: 0.35, f0: 110, f1: 50,  wob: 42, wobF: 16, vol: 0.40 },
      { t: 0.70, dur: 0.50, f0: 95,  f1: 45,  wob: 50, wobF: 13, vol: 0.50 }
    ];

    const totalDur = 1.4;
    const startNow = ctx.currentTime;

    for (const b of bursts) {
      const start = startNow + b.t;
      const end = start + b.dur;

      // Pitched buzz (sawtooth, descending)
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(b.f0, start);
      osc.frequency.exponentialRampToValueAtTime(b.f1, end);

      // Wobble LFO modulating pitch (the flappy bit)
      const lfo = ctx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = b.wobF;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = b.wob;
      lfo.connect(lfoGain).connect(osc.frequency);

      // Lowpass for that wet, muffled quality
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(1100, start);
      lp.frequency.exponentialRampToValueAtTime(280, end);
      lp.Q.value = 6;

      // Envelope: punchy attack, decay
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(b.vol, start + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);

      osc.connect(lp).connect(gain).connect(master);

      // Noise layer for the spluttering air
      const samples = Math.floor(ctx.sampleRate * b.dur);
      const noiseBuf = ctx.createBuffer(1, samples, ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < samples; i++) {
        // Amplitude-modulated noise so it sputters
        const t = i / ctx.sampleRate;
        const am = 0.6 + 0.4 * Math.sin(2 * Math.PI * b.wobF * 1.7 * t);
        data[i] = (Math.random() * 2 - 1) * am;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuf;
      const noiseBp = ctx.createBiquadFilter();
      noiseBp.type = 'bandpass';
      noiseBp.frequency.value = 350;
      noiseBp.Q.value = 1.2;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, start);
      noiseGain.gain.exponentialRampToValueAtTime(b.vol * 0.7, start + 0.02);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, end);
      noise.connect(noiseBp).connect(noiseGain).connect(master);

      osc.start(start); lfo.start(start); noise.start(start);
      osc.stop(end); lfo.stop(end); noise.stop(end);
    }

    setTimeout(() => ctx.close(), (totalDur + 0.3) * 1000);
  } catch (e) { console.warn('fart failed', e); }
}

// ---------- WebRTC / PeerJS ----------
let peer = null;
let conn = null;
let mediaCall = null;
let localStream = null;
const pendingMessages = [];

function sendToOpponent(msg) {
  if (!conn) { console.warn('[send] no conn yet, queuing', msg); pendingMessages.push(msg); return; }
  if (!conn.open) { console.warn('[send] conn not open, queuing', msg); pendingMessages.push(msg); return; }
  try { conn.send(msg); console.log('[send] →', msg); }
  catch (e) { console.error('[send] failed', e, msg); pendingMessages.push(msg); }
}

function flushPending() {
  while (pendingMessages.length && conn && conn.open) {
    const m = pendingMessages.shift();
    try { conn.send(m); console.log('[send-flush] →', m); }
    catch (e) { console.error('[send-flush] failed', e); pendingMessages.unshift(m); break; }
  }
}

const ICE_SERVERS = [
  { urls: 'stun:stun.cloudflare.com:3478' },
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:global.stun.twilio.com:3478' },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
];

function makeShortId() {
  // 6-char human-friendly id
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
  let s = '';
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return 'cc-' + s;
}

function setStatus(text) { document.getElementById('conn-status').textContent = text; }
function setError(text) {
  const el = document.getElementById('error-msg');
  if (text) { el.textContent = text; el.classList.remove('hidden'); }
  else el.classList.add('hidden');
}

async function getMedia() {
  if (localStream) return localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('local-video').srcObject = localStream;
    document.getElementById('video-placeholder').classList.add('hidden');
    return localStream;
  } catch (e) {
    setError('Камера/микрофон заблокированы: ' + e.message + '. Шахматная доска работает и без видео.');
    return null;
  }
}

function attachConnHandlers() {
  conn.on('open', () => {
    setStatus('Подключено');
    document.getElementById('connect-panel').classList.add('hidden');
    document.getElementById('game-controls').classList.remove('hidden');
    // Host (White) authoritatively sets time control and broadcasts it
    if (myColor === 'w') {
      timeControlMs = selectedTcMs;
      sendToOpponent({ type: 'config', timeMs: timeControlMs });
      startGameClock();
    }
    flushPending();
    renderBoard();
  });
  conn.on('data', (d) => {
    console.log('[recv] ←', d);
    if (!d || !d.type) return;
    if (d.type === 'move') applyRemoteMove(d);
    else if (d.type === 'config') {
      timeControlMs = d.timeMs || 0;
      startGameClock();
    }
    else if (d.type === 'newgame') {
      game.reset();
      selected = null; legalTargets = []; lastMove = null;
      myColor = d.yourColor;
      if (typeof d.timeMs === 'number') timeControlMs = d.timeMs;
      document.getElementById('game-over-modal').classList.add('hidden');
      startGameClock();
      renderBoard();
    }
    else if (d.type === 'resign') {
      stopGameClock();
      showGameOver('Соперник сдался 🎉', 'Ты выиграл.', false, true);
    }
  });
  conn.on('close', () => { setStatus('Соперник отключился'); });
  conn.on('error', (e) => { setError('Ошибка соединения: ' + e); });
}

function attachMediaCallHandlers() {
  mediaCall.on('stream', (stream) => {
    const v = document.getElementById('remote-video');
    v.srcObject = stream;
    v.play().catch(() => {});
    document.getElementById('video-placeholder').classList.add('hidden');
  });
  mediaCall.on('close', () => { console.log('media call closed'); });
  mediaCall.on('error', (e) => console.warn('media error', e));
}

function initPeer() {
  setStatus('Получаем твой код…');
  peer = new Peer(makeShortId(), { config: { iceServers: ICE_SERVERS }, debug: 1 });

  peer.on('open', (id) => {
    const url = location.origin + location.pathname + '#' + id;
    document.getElementById('my-link').textContent = url;
    setStatus('Готово — поделись ссылкой');

    // Auto-connect if the page was opened with #cc-... in the URL
    const target = location.hash.replace(/^#/, '').trim().toLowerCase();
    if (target && target.startsWith('cc-') && target !== id) {
      autoConnect(target);
    }
  });

  // Incoming data connection (we are the host → we play White)
  peer.on('connection', (c) => {
    if (conn && conn.open) { c.close(); return; }
    conn = c;
    myColor = 'w';
    attachConnHandlers();
    getMedia(); // start camera now so it's ready when the media call arrives
  });

  // Incoming media call → answer with our stream
  peer.on('call', async (c) => {
    mediaCall = c;
    attachMediaCallHandlers(); // attach BEFORE any await so we don't miss the 'stream' event
    const stream = await getMedia();
    if (stream) c.answer(stream);
    else c.answer();
  });

  peer.on('error', (e) => {
    console.error('peer error', e);
    if (e.type === 'peer-unavailable') setError('Никто не использует этот код. Проверь его ещё раз.');
    else if (e.type === 'network' || e.type === 'server-error' || e.type === 'socket-error' || e.type === 'disconnected') {
      setError('Сервер недоступен. Повтор через 3 с…');
      setTimeout(() => { try { peer.reconnect(); } catch(_){} }, 3000);
    } else setError('Ошибка: ' + e.type);
  });
}

async function autoConnect(target) {
  setError('');
  setStatus('Подключение…');
  await getMedia();

  conn = peer.connect(target, { reliable: true });
  myColor = 'b';
  attachConnHandlers();

  if (localStream) {
    mediaCall = peer.call(target, localStream);
    attachMediaCallHandlers();
  }
}

// ---------- UI wiring ----------
document.getElementById('copy-btn').addEventListener('click', async () => {
  const url = document.getElementById('my-link').textContent;
  const btn = document.getElementById('copy-btn');
  try { await navigator.clipboard.writeText(url); btn.textContent = 'Скопировано!'; setTimeout(() => btn.textContent = 'Копировать ссылку', 1500); } catch(_) {}
});
document.getElementById('newgame-btn').addEventListener('click', () => newGame(true));
document.getElementById('play-again-btn').addEventListener('click', () => newGame(true));
document.getElementById('resign-btn').addEventListener('click', () => {
  if (!conn || !conn.open) return;
  if (!confirm('Сдаться?')) return;
  sendToOpponent({ type: 'resign' });
  stopGameClock();
  showGameOver('Ты сдался 💨', 'В следующий раз повезёт.', true);
});

// Time-control picker wiring
function applySelectedTc(btn) {
  const v = btn.dataset.tc;
  document.querySelectorAll('.tc-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (v === 'custom') {
    document.getElementById('custom-time-row').classList.remove('hidden');
    const m = parseInt(document.getElementById('custom-minutes').value, 10);
    selectedTcMs = (m > 0 ? m : 15) * 60 * 1000;
  } else {
    document.getElementById('custom-time-row').classList.add('hidden');
    selectedTcMs = parseInt(v, 10) * 60 * 1000;
  }
}
document.querySelectorAll('.tc-btn').forEach(btn => btn.addEventListener('click', () => applySelectedTc(btn)));
document.getElementById('custom-minutes').addEventListener('input', (e) => {
  const m = parseInt(e.target.value, 10);
  if (m > 0) selectedTcMs = m * 60 * 1000;
});

// Initialize
renderBoard();
initPeer();
</script>
